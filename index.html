<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiwordle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3350;
    --correct:#538d4e; --present:#b59f3b; --absent:#3a3d52;
    --text:#e8eaf0; --muted:#7b82a0;
    --accent:#7c6af7; --aglow:rgba(124,106,247,.25);
    --kbg:#2e3350; --footer-h:130px;
  }
  *{box-sizing:border-box;margin:0;padding:0}

  /* ── Full-viewport layout ── */
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Space Grotesk',sans-serif;
    display:flex;flex-direction:column;
    align-items:stretch;
    user-select:none;
  }

  /* ── Header ── */
  #appHeader{
    flex-shrink:0;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 10px 12px;
    border-bottom:1px solid var(--border);
    background:var(--bg);
    z-index:10;
  }
  /* In game mode the boards are max 1060px centred with 10px padding each side.
     We constrain the header inner content to the same width so the logo lines up
     with the left edge of the board grid. */
  #appHeader .hdr-inner{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;max-width:1080px;margin:0 auto;
  }
  .logo{font-size:1.4rem;font-weight:700;letter-spacing:-.5px;
    background:linear-gradient(135deg,#7c6af7,#a78bfa);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    cursor:pointer;flex-shrink:0}
  .logo:hover{opacity:.8}
  .hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .guess-pill{font-size:.78rem;color:var(--muted);background:var(--surface);
    border:1px solid var(--border);padding:5px 12px;border-radius:20px;display:none}
  .guess-pill span{color:var(--accent);font-weight:600}
  #newGameBtn{background:var(--accent);color:#fff;border:none;padding:7px 16px;
    border-radius:20px;font-family:inherit;font-size:.78rem;font-weight:600;
    cursor:pointer;display:none}
  #newGameBtn:hover{opacity:.85}

  /* ── Mode screen ── */
  #modeScreen{
    flex:1;overflow-y:auto;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:40px;padding:40px 24px;
  }
  .mode-hero{text-align:center}
  .mode-hero h1{font-size:clamp(2rem,5vw,3.6rem);font-weight:700;letter-spacing:-1.5px;
    background:linear-gradient(135deg,#7c6af7,#a78bfa,#c4b5fd);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    line-height:1.05;margin-bottom:10px}
  .mode-hero p{color:var(--muted);font-size:.95rem;max-width:400px;line-height:1.6}
  .mode-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .mode-card{background:var(--surface);border:2px solid var(--border);border-radius:14px;
    padding:24px 26px;cursor:pointer;text-align:center;width:148px;
    transition:border-color .2s,transform .15s,box-shadow .2s}
  .mode-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 12px 32px var(--aglow)}
  .mode-num{font-size:2.6rem;font-weight:700;color:var(--accent);line-height:1;margin-bottom:4px}
  .mode-label{font-size:.73rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
  .mode-preview{display:grid;gap:3px;margin:12px auto 0;overflow:hidden;width:100%}
  .mp-row{display:flex;gap:3px;justify-content:center}
  .mp-tile{width:9px;height:9px;border-radius:2px;background:var(--absent);flex-shrink:0}
  .mp-tile.c{background:var(--correct)}.mp-tile.p{background:var(--present)}

  /* ── Game screen ── */
  #gameScreen{
    display:none;flex-direction:column;align-items:center;
    /* fills space between header and footer */
    flex:1;overflow:hidden;
    padding:10px 10px 0;
    gap:6px;
  }

  /* Row jump nav — 16-board only */
  #rowJumpNav{
    display:none;width:100%;max-width:1060px;
    flex-wrap:wrap;justify-content:center;align-items:center;
    gap:4px;padding:0 4px 4px;flex-shrink:0;
  }
  #rowJumpNav.show{display:flex}
  .rj-label{font-size:.7rem;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px;margin-right:4px;white-space:nowrap}
  .rj-btn{
    min-width:28px;height:26px;padding:0 5px;
    border:1.5px solid var(--border);border-radius:5px;
    background:var(--surface);color:var(--muted);
    font-family:inherit;font-size:.72rem;font-weight:600;cursor:pointer;
    transition:background .25s,border-color .25s,color .25s;
    display:flex;align-items:center;justify-content:center;
  }
  .rj-btn:hover{border-color:var(--accent);color:var(--accent)}
  .rj-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
  .rj-btn.solved{border-color:var(--correct);background:var(--correct);color:#fff}
  .rj-btn.failed{border-color:#6b3535;background:#3a1e1e;color:#f08080}

  /* Boards — this is the ONLY scrolling region */
  #boardsWrapper{
    overflow-y:scroll;overflow-x:hidden;
    width:100%;flex:1;
    display:flex;flex-direction:column;align-items:center;
    padding-bottom:6px;
    overscroll-behavior:contain;
    scroll-behavior:auto;
  }
  #boardsGrid{display:grid;gap:8px;width:100%;justify-items:center;contain:layout}
  .mode-1  #boardsGrid{grid-template-columns:1fr;max-width:340px}
  .mode-4  #boardsGrid{grid-template-columns:repeat(2,1fr);max-width:700px}
  .mode-8  #boardsGrid{grid-template-columns:repeat(4,1fr);max-width:1060px}
  .mode-16 #boardsGrid{grid-template-columns:repeat(4,1fr);max-width:1060px}

  .board{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;
    padding:8px;width:100%;max-width:260px;transition:background .5s,border-color .3s}
  .board.won{border-color:#4ade80;background:#1a3d2a}
  .board.lost{border-color:#6b3535;background:rgba(107,53,53,.18)}
  .board-header{display:flex;justify-content:space-between;align-items:center;
    margin-bottom:6px;padding:0 2px}
  .board-num{font-size:.68rem;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.5px}
  .board-status{font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:10px;display:none}
  .board.won .board-status{display:block;background:rgba(83,141,78,.25);color:#6fcf68}
  .board.lost .board-status{display:block;background:rgba(107,53,53,.25);color:#f08080}

  .tiles-grid{display:flex;flex-direction:column;gap:3px}
  .tile-row{display:flex;gap:3px}
  .tile{
    flex:1;aspect-ratio:1;
    border:2px solid var(--border);border-radius:3px;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(.85rem,2.2vw,1.3rem);
    font-weight:800;text-transform:uppercase;
    background:var(--surface);color:var(--text);
    transition:background .25s,border-color .2s;
    contain:layout;
    transform-origin:center center;
  }
  .tile.filled{border-color:var(--muted);animation:popIn .1s ease both}
  .tile.correct{background:var(--correct);border-color:var(--correct);color:#fff}
  .tile.present{background:var(--present);border-color:var(--present);color:#fff}
  .tile.absent{background:var(--absent);border-color:var(--absent);color:#7a7f99}
  .tile.shake{animation:shake .4s ease}
  .tile.bounce{animation:bounce .5s ease}

  @keyframes popIn{0%{transform:scale(.82)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  @keyframes bounce{0%{transform:scale(1)}30%{transform:scale(1.14)}60%{transform:scale(.95)}100%{transform:scale(1)}}

  /* ── STICKY FOOTER — fixed to viewport bottom, always visible ── */
  #gameFooter{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--bg);
    border-top:1px solid var(--border);
    display:none;flex-direction:column;align-items:center;
    padding:7px 8px 10px;gap:5px;
    z-index:20;
  }
  #gameFooter.show{display:flex}

  /* Single merged keyboard — letter keys show colour status, wide keys are Enter/⌫ */
  #keyboard{width:100%;max-width:520px}
  .key-row{display:flex;justify-content:center;gap:5px;margin-bottom:5px}
  .key{
    height:52px;min-width:36px;padding:0 4px;flex:1;max-width:46px;
    border:none;border-radius:6px;
    background:var(--kbg);color:var(--text);
    font-family:inherit;font-size:1.05rem;font-weight:700;
    cursor:pointer;text-transform:uppercase;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s,color .2s,transform .1s;
    position:relative;
  }
  .key.wide{max-width:68px;font-size:.78rem;font-weight:600}
  .key:active{transform:scale(.93)}
  /* Letter status colours — same keys, coloured by game state */
  .key.correct{background:var(--correct);color:#fff}
  .key.present{background:var(--present);color:#fff}
  .key.absent{background:#1e2135;color:#484d66}

  /* ── Toast ── */
  #toast{
    position:fixed;top:72px;left:50%;
    transform:translateX(-50%) translateY(-6px);
    background:var(--text);color:var(--bg);
    padding:9px 18px;border-radius:8px;
    font-weight:600;font-size:.88rem;
    opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;z-index:200;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ── End overlay ── */
  #endOverlay{
    display:none;position:fixed;inset:0;
    background:rgba(10,11,18,.88);backdrop-filter:blur(6px);
    z-index:100;align-items:center;justify-content:center;
  }
  #endOverlay.show{display:flex}
  .end-card{
    background:var(--surface);border:1.5px solid var(--border);
    border-radius:18px;padding:36px 44px;text-align:center;
    max-width:380px;width:90%;animation:popIn .3s ease;
  }
  .end-card h2{font-size:1.7rem;font-weight:700;margin-bottom:8px}
  .end-sub{color:var(--muted);font-size:.88rem;margin-bottom:22px;line-height:1.6}
  .end-stats{display:flex;justify-content:center;gap:24px;margin-bottom:26px}
  .end-stat{display:flex;flex-direction:column;align-items:center;gap:3px}
  .end-stat-num{font-size:1.9rem;font-weight:700;color:var(--accent)}
  .end-stat-lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .end-btns{display:flex;gap:10px;justify-content:center}
  .end-btn{padding:11px 22px;border-radius:24px;border:none;
    font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;
    transition:opacity .15s,transform .1s}
  .end-btn:hover{opacity:.85;transform:translateY(-1px)}
  .end-btn.primary{background:var(--accent);color:#fff}
  .end-btn.secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="appHeader">
  <div class="hdr-inner">
    <div class="logo" onclick="showModeScreen()">Multiwordle</div>
    <div class="hdr-right">
      <div class="guess-pill" id="guessCounter">
        Guess <span id="guessNum">1</span> / <span id="guessMax">6</span>
      </div>
      <button id="newGameBtn" onclick="startGame(currentMode)">New Game</button>
    </div>
  </div>
</div>

<!-- MODE SELECTION -->
<div id="modeScreen">
  <div class="mode-hero">
    <h1>Multiwordle</h1>
    <p>Solve one, four, eight, or sixteen Wordle puzzles at once. Every guess applies to all boards.</p>

    <div class="mode-card" onclick="startGame(1)">
      <div class="mode-num">1</div>

        <div class="mp-row"><div class="mp-tile c"></div><div class="mp-tile p"></div><div class="mp-tile"></div><div class="mp-tile c"></div><div class="mp-tile"></div></div>
        <div class="mp-row"><div class="mp-tile c"></div><div class="mp-tile c"></div><div class="mp-tile c"></div><div class="mp-tile c"></div><div class="mp-tile c"></div></div>
      </div>
    </div>
    <div class="mode-card" onclick="startGame(4)">
      <div class="mode-num">4</div>
      <div class="mode-preview" style="grid-template-columns:repeat(2,1fr);gap:5px">
        <div><div class="mp-row"><div class="mp-tile c"></div><div class="mp-tile"></div><div class="mp-tile p"></div><div class="mp-tile"></div><div class="mp-tile c"></div></div></div>

        <div><div class="mp-row"><div class="mp-tile c"></div><div class="mp-tile c"></div><div class="mp-tile"></div><div class="mp-tile c"></div><div class="mp-tile"></div></div></div>
        <div><div class="mp-row"><div class="mp-tile"></div><div class="mp-tile p"></div><div class="mp-tile c"></div><div class="mp-tile c"></div><div class="mp-tile c"></div></div></div>
      </div>
    </div>
    <div class="mode-card" onclick="startGame(16)">

      <div class="mode-preview" style="grid-template-columns:repeat(4,1fr);gap:3px">
        <div><div class="mp-row"><div class="mp-tile c"></div><div class="mp-tile p"></div><div class="mp-tile"></div><div class="mp-tile c"></div><div class="mp-tile"></div></div></div>
        <div><div class="mp-row"><div class="mp-tile"></div><div class="mp-tile c"></div><div class="mp-tile p"></div><div class="mp-tile"></div><div class="mp-tile c"></div></div></div>
        <div><div class="mp-row"><div class="mp-tile p"></div><div class="mp-tile"></div><div class="mp-tile c"></div><div class="mp-tile p"></div><div class="mp-tile"></div></div></div>
        <div><div class="mp-row"><div class="mp-tile c"></div><div class="mp-tile p"></div><div class="mp-tile"></div><div class="mp-tile c"></div><div class="mp-tile p"></div></div></div>

        <div><div class="mp-row"><div class="mp-tile p"></div><div class="mp-tile c"></div><div class="mp-tile"></div><div class="mp-tile p"></div><div class="mp-tile c"></div></div></div>
        <div><div class="mp-row"><div class="mp-tile"></div><div class="mp-tile p"></div><div class="mp-tile c"></div><div class="mp-tile c"></div><div class="mp-tile"></div></div></div>
        <div><div class="mp-row"><div class="mp-tile c"></div><div class="mp-tile c"></div><div class="mp-tile p"></div><div class="mp-tile"></div><div class="mp-tile c"></div></div></div>
        <div><div class="mp-row"><div class="mp-tile p"></div><div class="mp-tile"></div><div class="mp-tile c"></div><div class="mp-tile p"></div><div class="mp-tile c"></div></div></div>
        <div><div class="mp-row"><div class="mp-tile c"></div><div class="mp-tile p"></div><div class="mp-tile"></div><div class="mp-tile c"></div><div class="mp-tile p"></div></div></div>
        <div><div class="mp-row"><div class="mp-tile"></div><div class="mp-tile c"></div><div class="mp-tile c"></div><div class="mp-tile"></div><div class="mp-tile c"></div></div></div>
        <div><div class="mp-row"><div class="mp-tile p"></div><div class="mp-tile c"></div><div class="mp-tile p"></div><div class="mp-tile c"></div><div class="mp-tile c"></div></div></div>
      </div>
    </div>
  </div>
</div>

<!-- GAME AREA -->
<div id="gameScreen">
  <div id="rowJumpNav"></div>
  <div id="boardsWrapper">
    <div id="boardsGrid"></div>
  </div>
</div>

<!-- FIXED FOOTER: merged keyboard (input + letter status legend) -->
<footer id="gameFooter">
  <div id="keyboard">
    <div class="key-row" id="keyRow1"></div>
    <div class="key-row" id="keyRow2"></div>
    <div class="key-row" id="keyRow3"></div>
  </div>
</footer>

<div id="toast"></div>
<div id="endOverlay">
  <div class="end-card">
    <h2 id="endTitle"></h2>
    <p class="end-sub" id="endSub"></p>
    <div class="end-stats" id="endStats"></div>
    <div class="end-btns">
      <button class="end-btn primary" onclick="startGame(currentMode)">Play Again</button>
      <button class="end-btn secondary" onclick="showModeScreen()">Change Mode</button>
    </div>
  </div>
</div>

// ── State ──
let currentMode=1, maxGuesses=6, targets=[], boardStates=[], currentGuess='', gameOver=false;

// ── Helpers ──
function pickWords(n){
  return [...WORD_LIST].sort(()=>Math.random()-.5).slice(0,n);
}
function getResult(guess,target){
  const r=Array(5).fill('absent'), tl=target.split('');
  for(let i=0;i<5;i++) if(guess[i]===target[i]){r[i]='correct';tl[i]=null;}
  for(let i=0;i<5;i++){
    if(r[i]==='correct') continue;
    const j=tl.indexOf(guess[i]);
    if(j!==-1){r[i]='present';tl[j]=null;}
  }
  return r;
}

// ── Footer height compensation ── 
// gameScreen needs bottom padding equal to footer height so boards don't hide behind footer
function updateFooterPad(){
  const fh = document.getElementById('gameFooter').offsetHeight;
  document.getElementById('gameScreen').style.paddingBottom = fh + 'px';
}

// ── Build boards ──
function buildBoards(){
  const grid=document.getElementById('boardsGrid');
  grid.innerHTML='';
  document.body.className=`mode-${currentMode}`;
  const guessCounts={1:6,4:9,8:13,16:21};
  maxGuesses=guessCounts[currentMode]||6;
  document.getElementById('guessMax').textContent=maxGuesses;
  document.getElementById('guessNum').textContent=1;
  targets.forEach((word,i)=>{
    const b=document.createElement('div');
    b.className='board'; b.id=`board-${i}`;
    b.innerHTML=`<div class="board-header"><span class="board-num">Board ${i+1}</span><span class="board-status" id="bstat-${i}"></span></div><div class="tiles-grid" id="tgrid-${i}"></div>`;
    grid.appendChild(b);
    const tg=document.getElementById(`tgrid-${i}`);
    for(let r=0;r<maxGuesses;r++){
      const row=document.createElement('div');
      row.className='tile-row'; row.id=`row-${i}-${r}`;
      for(let c=0;c<5;c++){
        const t=document.createElement('div');
        t.className='tile'; t.id=`t-${i}-${r}-${c}`;
        row.appendChild(t);
      }
      tg.appendChild(row);
    }
  });
  buildRowJumpNav();
}

// ── Board jump nav (all multi-board modes) ──
function buildRowJumpNav(){
  const nav=document.getElementById('rowJumpNav');
  nav.innerHTML='';
  if(currentMode===1){nav.classList.remove('show');return;}
  nav.classList.add('show');
  const lbl=document.createElement('span');
  lbl.className='rj-label'; lbl.textContent='Jump to Board:';
  nav.appendChild(lbl);
  for(let b=1;b<=currentMode;b++){
    const btn=document.createElement('button');
    btn.className='rj-btn'; btn.textContent=b; btn.dataset.board=b;
    btn.addEventListener('click',()=>jumpToBoard(b-1));
    nav.appendChild(btn);
  }
}

function jumpToBoard(boardIdx){
  const wrapper=document.getElementById('boardsWrapper');
  // For a 4-column grid, clicking board 5 (idx 4) should show the row containing boards 5-8.
  // Find the first board in the same grid row (every 4 boards = one row in 8/16 mode).
  const cols={1:1,4:2,8:4,16:4}[currentMode]||1;
  const rowStartIdx=Math.floor(boardIdx/cols)*cols;
  const targetEl=document.getElementById(`board-${rowStartIdx}`);
  if(!targetEl) return;
  // getBoundingClientRect gives positions relative to the viewport.
  // wrapper.scrollTop + (element's top relative to wrapper top) = desired scrollTop.
  const wrapperRect=wrapper.getBoundingClientRect();
  const targetRect=targetEl.getBoundingClientRect();
  const newScrollTop=wrapper.scrollTop+(targetRect.top-wrapperRect.top)-8;
  wrapper.scrollTo({top:Math.max(0,newScrollTop),behavior:'smooth'});
}

function updateBoardNav(){
  document.querySelectorAll('.rj-btn').forEach(btn=>{
    const bi=parseInt(btn.dataset.board)-1;
    btn.classList.remove('solved','failed','active');
    if(boardStates[bi] && boardStates[bi].solved){
      btn.classList.add('solved');
      btn.textContent='✓';
      btn.title=`Board ${bi+1} — solved`;
    } else if(boardStates[bi] && boardStates[bi].failed){
      btn.classList.add('failed');
      btn.textContent=bi+1;
      btn.title=`Board ${bi+1} — failed`;
    } else {
      btn.textContent=bi+1;
      btn.title=`Board ${bi+1}`;
    }
  });
}

// ── Build keyboard (merged input + legend) ──
const KROWS=[
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['Enter','Z','X','C','V','B','N','M','⌫']
];
function buildKeyboard(){
  KROWS.forEach((row,ri)=>{
    const el=document.getElementById(`keyRow${ri+1}`); el.innerHTML='';
    row.forEach(k=>{
      const btn=document.createElement('button');
      btn.className='key'+(k.length>1?' wide':'');
      btn.textContent=k; btn.dataset.key=k;
      btn.addEventListener('click',()=>handleKey(k));
      el.appendChild(btn);
    });
  });
}

// Update keyboard key colours based on best result across all boards
function updateKeyboard(){
  const prio={correct:3,present:2,absent:1};
  const best={};
  targets.forEach((target,bi)=>{
    boardStates[bi].guesses.forEach(g=>{
      getResult(g,target.toLowerCase()).forEach((r,i)=>{
        const l=g[i];
        if(!best[l]||prio[r]>prio[best[l]]) best[l]=r;
      });
    });
  });
  document.querySelectorAll('.key').forEach(btn=>{
    const k=btn.dataset.key.toLowerCase();
    if(best[k]) btn.className='key'+(btn.dataset.key.length>1?' wide':'')+` ${best[k]}`;
  });
}

// ── Game flow ──
function startGame(mode){
  currentMode=mode;
  targets=pickWords(mode);
  boardStates=targets.map(()=>({guesses:[],solved:false,failed:false}));
  currentGuess=''; gameOver=false;

  document.getElementById('modeScreen').style.display='none';
  document.getElementById('gameScreen').style.display='flex';
  document.getElementById('gameFooter').classList.add('show');
  document.getElementById('guessCounter').style.display='';
  document.getElementById('newGameBtn').style.display='';
  document.getElementById('endOverlay').classList.remove('show');

  buildBoards();
  buildKeyboard();
  // After footer renders, calculate padding so boards clear the footer
  requestAnimationFrame(()=>{
    updateFooterPad();
    renderCurrent();
  });
}

function showModeScreen(){
  document.getElementById('modeScreen').style.display='';
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('gameFooter').classList.remove('show');
  document.getElementById('guessCounter').style.display='none';
  document.getElementById('newGameBtn').style.display='none';
  document.getElementById('endOverlay').classList.remove('show');
  document.getElementById('rowJumpNav').classList.remove('show');
  document.getElementById('gameScreen').style.paddingBottom='';
}

function renderCurrent(){
  const row=boardStates[0].guesses.length;
  targets.forEach((_,bi)=>{
    if(boardStates[bi].solved||boardStates[bi].failed) return;
    for(let c=0;c<5;c++){
      const t=document.getElementById(`t-${bi}-${row}-${c}`);
      if(!t) return;
      const letter=currentGuess[c]||'';
      t.textContent=letter;
      t.className='tile'+(letter?' filled':'');
    }
  });
}

function handleKey(key){
  if(gameOver) return;
  if(key==='⌫'||key==='Backspace'){
    if(currentGuess.length>0){currentGuess=currentGuess.slice(0,-1);renderCurrent();}
    return;
  }
  if(key==='Enter'){submitGuess();return;}
  if(/^[A-Za-z]$/.test(key)&&currentGuess.length<5){
    currentGuess+=key.toUpperCase();renderCurrent();
  }
}

function submitGuess(){
  if(currentGuess.length<5){shakeRow();showToast('Not enough letters');return;}
  const g=currentGuess.toLowerCase();
  if(!WORD_LIST.includes(g)){shakeRow();showToast('Not in word list');return;}
  const row=boardStates[0].guesses.length;
  boardStates.forEach(bs=>bs.guesses.push(g));
  currentGuess='';
  revealAll(g,row).then(()=>{
    updateKeyboard();
    const allDone=boardStates.every(bs=>bs.solved||bs.failed);
    if(allDone){gameOver=true;setTimeout(()=>showEnd(),400);return;}
    if(row+1>=maxGuesses){
      boardStates.forEach((bs,bi)=>{
        if(!bs.solved){
          bs.failed=true;
          document.getElementById(`board-${bi}`).classList.add('lost');
          document.getElementById(`bstat-${bi}`).textContent=targets[bi].toUpperCase();
        }
      });
      updateBoardNav();
      gameOver=true;
      setTimeout(()=>showEnd(),600);
      return;
    }
    document.getElementById('guessNum').textContent=row+2;
    renderCurrent();
  });
}

function revealAll(guess,row){
  return new Promise(resolve=>{
    let pending=targets.length;
    targets.forEach((target,bi)=>{
      if(boardStates[bi].solved){pending--;if(!pending)resolve();return;}
      const result=getResult(guess,target.toLowerCase());
      const solved=result.every(r=>r==='correct');
      result.forEach((res,ci)=>{
        setTimeout(()=>{
          const tile=document.getElementById(`t-${bi}-${row}-${ci}`);
          tile.style.transition='transform .12s';
          tile.style.transform='rotateX(-90deg)';
          setTimeout(()=>{
            tile.className=`tile ${res}`;
            tile.textContent=guess[ci].toUpperCase();
            tile.style.transform='rotateX(0deg)';
            if(ci===4){
              if(solved){
                boardStates[bi].solved=true;
                document.getElementById(`board-${bi}`).classList.add('won');
                const st=document.getElementById(`bstat-${bi}`);
                st.textContent='✓ Solved!';
                updateBoardNav();
                for(let c=0;c<5;c++)
                  setTimeout(()=>document.getElementById(`t-${bi}-${row}-${c}`).classList.add('bounce'),c*55);
              }
              pending--;
              if(!pending) setTimeout(resolve,150);
            }
          },110);
        }, ci*75+bi*12);
      });
    });
  });
}

function shakeRow(){
  const row=boardStates[0].guesses.length;
  targets.forEach((_,bi)=>{
    for(let c=0;c<5;c++){
      const t=document.getElementById(`t-${bi}-${row}-${c}`);
      if(t){t.classList.add('shake');setTimeout(()=>t.classList.remove('shake'),500);}
    }
  });
}

function showEnd(){
  const solved=boardStates.filter(b=>b.solved).length;
  const total=targets.length;
  const guesses=boardStates[0].guesses.length;
  const allSolved=solved===total;
  document.getElementById('endTitle').textContent=
    allSolved?(total===1?'🎉 Solved it!':'🎉 All solved!'):
    solved>0?`✅ ${solved} of ${total} solved`:'💔 Better luck next time';
  document.getElementById('endSub').textContent=allSolved
    ?`Completed in ${guesses} guess${guesses!==1?'es':''}.`
    :`You solved ${solved}/${total} boards in ${guesses} guesses.`;
  document.getElementById('endStats').innerHTML=`
    <div class="end-stat"><div class="end-stat-num">${guesses}</div><div class="end-stat-lbl">Guesses</div></div>
    <div class="end-stat"><div class="end-stat-num">${solved}/${total}</div><div class="end-stat-lbl">Solved</div></div>`;
  document.getElementById('endOverlay').classList.add('show');
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  if(e.key==='Enter') handleKey('Enter');
  else if(e.key==='Backspace') handleKey('Backspace');
  else if(/^[A-Za-z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

window.addEventListener('resize', ()=>{
  if(document.getElementById('gameFooter').classList.contains('show')) updateFooterPad();
});
</script>
